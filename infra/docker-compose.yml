# Phase 0 infra: Postgres + Redis (layer 1), Redpanda (layer 2).
#
# This file is built up incrementally on purpose (see docs/architecture.md
# Phase 0). Each layer is verified working before the next is added - so if
# something breaks, we know exactly which layer broke it. The observability
# stack (Prometheus/Grafana/Jaeger) lands in a later commit.
#
# Run from the repo root:
#   docker compose -f infra/docker-compose.yml --env-file infra/.env up -d
#   docker compose -f infra/docker-compose.yml ps
#   docker compose -f infra/docker-compose.yml logs -f
#
# (infra/.env holds secrets/config and is gitignored - see infra/.env.example)

services:
  postgres:
    image: postgres:16-alpine
    container_name: wallet-postgres
    restart: unless-stopped
    environment:
      # A single Postgres SERVER for the whole dev stack (RAM budget on a
      # 16GB host - see docs/adr/0006-database-per-service.md's dev-env
      # note). Each service still gets its own DATABASE within this server
      # (created by init-databases.sh below), and no service is ever given
      # credentials to another service's database - so the "no shared
      # tables, no cross-service queries" rule from ADR-0006 still holds.
      # Only the physical container is shared, not the logical boundary.
      POSTGRES_USER: ${POSTGRES_USER:-wallet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in infra/.env}
      # POSTGRES_DB creates one default DB on first boot; our real per-service
      # databases are created by the init script mounted below.
      POSTGRES_DB: postgres
    ports:
      # Exposed to the host so you can connect with a GUI client (DBeaver,
      # TablePlus, psql) while developing. Services running IN Docker will
      # reach this via the service name "postgres", not localhost.
      - "5432:5432"
    volumes:
      # Named volume: Postgres data survives `docker compose down` (only
      # `down -v` or manually removing the volume wipes it). This matters
      # once real ledger data exists in here.
      - wallet-postgres-data:/var/lib/postgresql/data
      # Runs once against a FRESH data directory only (Postgres image
      # convention). If you edit this script after the volume already
      # exists, you must drop the volume for it to re-run.
      - ./postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      # `depends_on: condition: service_healthy` (used by later services)
      # waits for this, not just for the container to be "running" - a
      # container can be up before Postgres is actually ready to accept
      # connections.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wallet}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - wallet-net

  redis:
    image: redis:7-alpine
    container_name: wallet-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      # Redis here is cache + coordination (idempotency keys, rate limits,
      # OTP storage, distributed locks - see docs/architecture.md section
      # 6.1-6.2). None of that needs to be durable across a full stack rebuild, but
      # persisting it avoids re-triggering OTP/cache-miss flows on every
      # restart during development.
      - wallet-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - wallet-net

  redpanda:
    # Kafka-API-compatible event bus (see docs/adr/0002-kafka-event-bus.md).
    # This is a single-node DEV cluster - fine for local/demo, not how you'd
    # run it for real durability/HA (that would be 3+ nodes).
    #
    # Pinned to the exact version confirmed working in Phase 0 (verified via
    # `docker exec wallet-redpanda rpk version`) - "latest" would silently
    # drift to a different version on a future `docker compose pull`.
    image: docker.redpanda.com/redpandadata/redpanda:v26.1.13
    container_name: wallet-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      # --mode dev-container applies sane single-node defaults (memory,
      # topic replication = 1, etc.) so we don't have to hand-tune every
      # broker flag for a laptop-scale dev cluster.
      - --mode
      - dev-container
      - --smp
      - "1"
      # Two listeners per API: "internal" is how OTHER CONTAINERS on
      # wallet-net reach it (hostname "redpanda"); "external" is how the
      # HOST (your WSL shell, a GUI tool) reaches it, via localhost on the
      # mapped ports below. Services we build later will use the internal
      # address; you'll use the external one to poke at it by hand.
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr
      - internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr
      - internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr
      - internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr
      - redpanda:33145
      - --advertise-rpc-addr
      - redpanda:33145
    ports:
      - "19092:19092" # Kafka API (from the host)
      - "18081:18081" # Schema registry
      - "18082:18082" # HTTP proxy (produce/consume over REST)
      - "19644:9644"  # Admin API - also serves Prometheus metrics at
                      # /metrics and /public_metrics; wired up when we add
                      # the observability stack.
    volumes:
      - wallet-redpanda-data:/var/lib/redpanda/data
    healthcheck:
      # `rpk` (Redpanda's CLI) ships inside the image - this is the same
      # tool we use by hand below to prove produce/consume works.
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - wallet-net

  prometheus:
    # Metrics pillar (docs/architecture.md 6.4): polls every target below on
    # an interval and stores the numbers as time series. Pinned to the
    # version confirmed working (`prometheus --version` inside the
    # container), same discipline as redpanda.
    image: prom/prometheus:v3.13.1
    container_name: wallet-prometheus
    restart: unless-stopped
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - wallet-prometheus-data:/prometheus
    ports:
      - "9090:9090" # Prometheus UI - browse to check scrape target health
    networks:
      - wallet-net

  grafana:
    # Dashboards over Prometheus's metrics and a query UI over Jaeger's
    # traces (both wired up automatically - see
    # observability/grafana/provisioning/datasources/datasources.yml).
    # Pinned to the version confirmed working (via GET /api/health).
    image: grafana/grafana:13.1.0
    container_name: wallet-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      # Host port 3001, not 3000 - the customer/agent/admin frontends
      # (Next.js) will want 3000 later, so we free it up now rather than
      # fight over it in a future phase.
      - "3001:3000"
    volumes:
      - wallet-grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - wallet-net

  jaeger:
    # Traces pillar (docs/architecture.md 6.4): the one that lets us watch
    # ONE request's path across MULTIPLE containers - the whole point of
    # Phase 0 step 7. "all-in-one" bundles collector + query UI + storage
    # in a single image with in-memory storage - traces don't survive a
    # restart, which is fine for dev/demo (a real deployment would use a
    # persistent backend like Elasticsearch or Cassandra).
    # Pinned by digest, not a version tag - the all-in-one image ships no
    # queryable version string/label, so the content digest is the only
    # reliable way to pin exactly what was confirmed working.
    image: jaegertracing/all-in-one@sha256:ab6f1a1f0fb49ea08bcd19f6b84f6081d0d44b364b6de148e1798eb5816bacac
    container_name: wallet-jaeger
    restart: unless-stopped
    environment:
      # Explicit even though it defaults to true on recent versions -
      # documents that services will send traces via the OpenTelemetry
      # Protocol (OTLP), not Jaeger's older native format.
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686" # Jaeger UI - browse to see traces
      - "4317:4317"   # OTLP gRPC receiver (services push traces here)
      - "4318:4318"   # OTLP HTTP receiver
    networks:
      - wallet-net

networks:
  # Dedicated bridge network so services resolve each other by name
  # (e.g. "postgres", "redis", "redpanda") instead of localhost/IP - this is
  # the container-network equivalent of service discovery, and it's how
  # every later service will reach these three.
  wallet-net:
    name: wallet-net

volumes:
  wallet-postgres-data:
  wallet-redis-data:
  wallet-redpanda-data:
  wallet-prometheus-data:
  wallet-grafana-data:
